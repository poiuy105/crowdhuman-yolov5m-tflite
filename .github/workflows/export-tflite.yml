name: Export CrowdHuman YOLOv5m to TFLite FP16

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-tflite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ultralytics pandas pyyaml tqdm matplotlib seaborn scipy ipython
          pip install opencv-python-headless pillow

      - name: Download model from GitHub Release
        run: |
          wget -q --show-progress \
            -O crowdhuman_vbody_yolov5m.pt \
            "https://github.com/poiuy105/crowdhuman-yolov5m-tflite/releases/download/v0.0.0-model/crowdhuman_vbody_yolov5m.pt"
          ls -lh crowdhuman_vbody_yolov5m.pt
          FILE_SIZE=$(stat -c%s crowdhuman_vbody_yolov5m.pt)
          echo "File size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "ERROR: Downloaded file is too small"
            exit 1
          fi

      - name: Clone YOLOv5
        run: |
          git clone --depth 1 --branch v7.0 https://github.com/ultralytics/yolov5.git

      - name: Export to TFLite
        run: |
          cd yolov5
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          cat > export_tflite.py << 'EOF'
          import sys
          sys.setrecursionlimit(10000)
          from export import run
          run(
              weights='../crowdhuman_vbody_yolov5m.pt',
              include=['tflite'],
              imgsz=[640],
              half=False,
              int8=False,
          )
          EOF
          python export_tflite.py
          cd ..
          find . -name "*.tflite" -type f

      - name: Copy TFLite model
        run: |
          find . -name "*.tflite" -type f -exec cp {} crowdhuman_vbody_yolov5m.tflite \;
          ls -lh crowdhuman_vbody_yolov5m.tflite

      - name: Upload TFLite model artifact
        uses: actions/upload-artifact@v4
        with:
          name: crowdhuman-yolov5m-tflite
          path: crowdhuman_vbody_yolov5m.tflite
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-tflite
          name: "CrowdHuman YOLOv5m TFLite v1.0.0"
          body: |
            ## CrowdHuman YOLOv5m - TFLite

            ### Model Info
            - **Base model**: YOLOv5m trained on CrowdHuman dataset
            - **Source**: [mikel-brostrom/Yolov5_DeepSort_Pytorch](https://github.com/mikel-brostrom/Yolov5_DeepSort_Pytorch)
            - **Export format**: TFLite (INT8 quantized by default from YOLOv5 export)
            - **Input size**: 640x640
            - **Classes**: person (class 0)
            - **Use case**: Person detection in crowded scenes (back view, side view, partial occlusion)

            ### Files
            - `crowdhuman_vbody_yolov5m.tflite` - TFLite model for mobile/edge deployment

            ### Usage
            ```python
            import numpy as np
            from tflite_runtime.interpreter import Interpreter

            interpreter = Interpreter('crowdhuman_vbody_yolov5m.tflite')
            interpreter.allocate_tensors()

            input_details = interpreter.get_input_details()
            output_details = interpreter.get_output_details()

            # Prepare input (640x640 RGB image, normalized to 0-1)
            input_data = np.random.randn(1, 640, 640, 3).astype(np.float32)
            interpreter.set_tensor(input_details[0]['index'], input_data)
            interpreter.invoke()
            ```
          files: crowdhuman_vbody_yolov5m.tflite
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
