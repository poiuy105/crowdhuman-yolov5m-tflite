name: Export CrowdHuman YOLOv5m to TFLite FP16

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-tflite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ultralytics onnx onnxruntime

      - name: Copy model from repository
        run: |
          cp models/crowdhuman_vbody_yolov5m.pt crowdhuman_yolov5m.pt
          ls -lh crowdhuman_yolov5m.pt

      - name: Export to TFLite FP16
        run: |
          yolo export \
            model=crowdhuman_yolov5m.pt \
            format=tflite \
            imgsz=640 \
            half=True

      - name: List exported files
        run: |
          echo "=== Exported files ==="
          ls -lh crowdhuman_yolov5m_saved_model/
          ls -lh crowdhuman_yolov5m_float16.tflite 2>/dev/null || true
          ls -lh *.tflite 2>/dev/null || true

      - name: Upload TFLite FP16 model artifact
        uses: actions/upload-artifact@v4
        with:
          name: crowdhuman-yolov5m-fp16-tflite
          path: |
            crowdhuman_yolov5m_float16.tflite
            crowdhuman_yolov5m_saved_model/
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-fp16
          name: "CrowdHuman YOLOv5m TFLite FP16 v1.0.0"
          body: |
            ## CrowdHuman YOLOv5m - TFLite FP16

            ### Model Info
            - **Base model**: YOLOv5m trained on CrowdHuman dataset
            - **Source**: [mikel-brostrom/Yolov5_DeepSort_Pytorch](https://github.com/mikel-brostrom/Yolov5_DeepSort_Pytorch)
            - **Export format**: TFLite FP16 (half precision)
            - **Input size**: 640x640
            - **Classes**: person (class 0)
            - **Use case**: Person detection in crowded scenes (back view, side view, partial occlusion)

            ### Files
            - `crowdhuman_yolov5m_float16.tflite` - TFLite FP16 model for mobile/edge deployment

            ### Usage
            ```python
            import numpy as np
            from tflite_runtime.interpreter import Interpreter

            interpreter = Interpreter('crowdhuman_yolov5m_float16.tflite')
            interpreter.allocate_tensors()

            input_details = interpreter.get_input_details()
            output_details = interpreter.get_output_details()

            # Prepare input (640x640 RGB image, normalized to 0-1)
            input_data = np.random.randn(1, 640, 640, 3).astype(np.float32)
            interpreter.set_tensor(input_details[0]['index'], input_data)
            interpreter.invoke()
            ```
          files: |
            crowdhuman_yolov5m_float16.tflite
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
