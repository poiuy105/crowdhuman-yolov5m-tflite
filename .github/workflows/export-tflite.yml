name: Export CrowdHuman YOLOv5m to TFLite FP16

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-tflite:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install ultralytics onnx==1.14.1 onnxruntime onnxsim pandas pyyaml tqdm matplotlib seaborn scipy
          pip install opencv-python-headless pillow

      - name: Download model from GitHub Release
        run: |
          wget -q --show-progress \
            -O crowdhuman_vbody_yolov5m.pt \
            "https://github.com/poiuy105/crowdhuman-yolov5m-tflite/releases/download/v0.0.0-model/crowdhuman_vbody_yolov5m.pt"
          ls -lh crowdhuman_vbody_yolov5m.pt
          FILE_SIZE=$(stat -c%s crowdhuman_vbody_yolov5m.pt)
          echo "File size: $FILE_SIZE bytes"
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "ERROR: Downloaded file is too small"
            exit 1
          fi

      - name: Clone YOLOv5 and export to ONNX
        run: |
          git clone --depth 1 https://github.com/ultralytics/yolov5.git
          cd yolov5
          python export.py \
            --weights ../crowdhuman_vbody_yolov5m.pt \
            --include onnx \
            --imgsz 640
          cd ..
          ls -lh *.onnx

      - name: Install onnx-tf and TensorFlow
        run: |
          pip install onnx==1.15.0
          pip install tensorflow==2.15.0 tensorflow-probability==0.23.0 onnx-tf==1.10.0

      - name: Convert ONNX to TFLite FP16
        run: |
          python3 << 'PYEOF'
          import tensorflow as tf
          import onnx
          from onnx_tf.backend import prepare

          print('Loading ONNX model...')
          onnx_model = onnx.load('crowdhuman_vbody_yolov5m.onnx')
          print('Preparing TF representation...')
          tf_rep = prepare(onnx_model)
          print('Exporting to SavedModel...')
          tf_rep.export_graph('saved_model')

          print('Converting to TFLite FP16...')
          converter = tf.lite.TFLiteConverter.from_saved_model('saved_model')
          converter.optimizations = [tf.lite.Optimize.DEFAULT]
          converter.target_spec.supported_types = [tf.float16]
          tflite_model = converter.convert()

          with open('crowdhuman_vbody_yolov5m_fp16.tflite', 'wb') as f:
              f.write(tflite_model)
          print('Done! TFLite FP16 model saved.')
          PYEOF
          ls -lh *.tflite

      - name: Upload TFLite FP16 model artifact
        uses: actions/upload-artifact@v4
        with:
          name: crowdhuman-yolov5m-fp16-tflite
          path: crowdhuman_vbody_yolov5m_fp16.tflite
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-fp16
          name: "CrowdHuman YOLOv5m TFLite FP16 v1.0.0"
          body: |
            ## CrowdHuman YOLOv5m - TFLite FP16

            ### Model Info
            - **Base model**: YOLOv5m trained on CrowdHuman dataset
            - **Source**: [mikel-brostrom/Yolov5_DeepSort_Pytorch](https://github.com/mikel-brostrom/Yolov5_DeepSort_Pytorch)
            - **Export format**: TFLite FP16 (half precision)
            - **Input size**: 640x640
            - **Classes**: person (class 0)
            - **Use case**: Person detection in crowded scenes (back view, side view, partial occlusion)

            ### Files
            - `crowdhuman_vbody_yolov5m_fp16.tflite` - TFLite FP16 model for mobile/edge deployment

            ### Usage
            ```python
            import numpy as np
            from tflite_runtime.interpreter import Interpreter

            interpreter = Interpreter('crowdhuman_vbody_yolov5m_fp16.tflite')
            interpreter.allocate_tensors()

            input_details = interpreter.get_input_details()
            output_details = interpreter.get_output_details()

            # Prepare input (640x640 RGB image, normalized to 0-1)
            input_data = np.random.randn(1, 640, 640, 3).astype(np.float32)
            interpreter.set_tensor(input_details[0]['index'], input_data)
            interpreter.invoke()
            ```
          files: crowdhuman_vbody_yolov5m_fp16.tflite
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
